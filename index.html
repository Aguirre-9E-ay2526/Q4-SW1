<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;

    background-image: url("lightblueswurk.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

    .login-container {
        background: white;
        padding: 30px;
        border-radius: 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 300px;
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .login-container input {
        width: 100%;
        padding: 5px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 10px;
    }

    .login-container button {
        width: auto;
        padding: 10px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    .login-container button:hover {
        background: #45a049;
    }

    .login-container .footer {
        text-align: center;
        margin-top: 10px;
        font-size: 12px;
    }
</style>

</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Forgot password?
    </div>
</div>

</body>
</html>
